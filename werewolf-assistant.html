<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>🐺 狼人杀发言助手 Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f4f6f9;
  --bg2:#eef1f5;
  --card:#ffffff;
  --card2:#f8f9fb;
  --card3:#f0f2f6;
  --border:#dce0e8;
  --accent:#00c9a7;
  --accent2:#1976d2;
  --accent3:#00bcd4;
  --gold:#00e676;
  --gold2:#00b894;
  --text:#1a1a2e;
  --text2:#555570;
  --dim:#8888a0;
  --green:#2ecc71;
  --green2:#1a8a4e;
  --red:#e74c3c;
  --blue:#42a5f5;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-hover:0 6px 24px rgba(0,201,167,.12);
  --glow:0 0 16px rgba(0,201,167,.15);
}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
#setup-screen{display:flex;flex-direction:column;align-items:center;padding:60px 20px;min-height:100vh;}
#setup-screen h1{font-size:2.2em;margin-bottom:4px;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;}
#setup-screen .subtitle{color:var(--text2);margin-bottom:40px;font-size:0.9em;}
.setup-form{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);}
.setup-form label{display:block;margin:18px 0 6px;font-size:0.85em;color:var(--text2);font-weight:500;letter-spacing:.3px;}
.setup-form select,.setup-form input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);border:1px solid var(--border);font-size:0.95em;outline:none;transition:all .25s ease;}
.setup-form select:focus,.setup-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,201,167,.15);background:var(--card3);}
.setup-form select:hover,.setup-form input:hover{border-color:#b0b8c8;}
.setup-form select option{background:var(--card2);color:var(--text);}
.setup-form .btn-start{width:100%;margin-top:28px;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#00897b);color:#fff;font-size:1.1em;font-weight:700;cursor:pointer;transition:all .25s ease;box-shadow:0 4px 15px rgba(0,201,167,.3);letter-spacing:1px;}
.setup-form .btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,201,167,.4);}
.setup-form .btn-start:active{transform:translateY(0) scale(.98);box-shadow:0 2px 10px rgba(0,201,167,.2);}
.setup-form .apikey-note{font-size:0.72em;color:var(--dim);margin-top:6px;line-height:1.4;}
.setup-form .btn-restore{width:100%;margin-top:12px;padding:12px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:0.85em;cursor:pointer;transition:all .25s ease;}
.setup-form .btn-restore:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,201,167,.05);}
.setup-form .section-title{font-size:0.85em;color:var(--gold);margin-top:28px;padding-bottom:6px;border-bottom:1px solid var(--border);font-weight:600;letter-spacing:1px;}
#game-screen{display:none;padding:16px;max-width:1100px;margin:0 auto;}
.game-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);}
.game-header .info{display:flex;gap:10px;flex-wrap:wrap;}
.game-header .info span{background:var(--card3);padding:5px 12px;border-radius:var(--radius-sm);font-size:0.82em;border:1px solid var(--border);}
.game-header .info .myrole{color:var(--accent);font-weight:700;border-color:rgba(0,201,167,.3);}
.game-header .info .myseat{color:var(--gold);font-weight:700;border-color:rgba(0,230,118,.2);}
.game-header .round-ctrl{display:flex;gap:6px;align-items:center;}
.game-header .round-ctrl button{padding:7px 14px;border:none;border-radius:var(--radius-sm);background:var(--card3);color:var(--text);cursor:pointer;font-size:0.82em;transition:all .2s ease;border:1px solid var(--border);}
.game-header .round-ctrl button:hover{background:var(--accent2);border-color:var(--accent2);transform:translateY(-1px);}
.game-header .round-ctrl button:active{transform:translateY(0) scale(.95);}
.game-header .round-ctrl .round-num{font-weight:700;font-size:1em;min-width:65px;text-align:center;color:var(--gold);}
.game-header .phase-toggle{padding:7px 18px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:700;font-size:0.85em;transition:all .25s ease;letter-spacing:.5px;}
.phase-toggle.day{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#00221a;}
.phase-toggle.day:hover{box-shadow:0 4px 20px rgba(0,230,118,.35);transform:translateY(-1px);}
.phase-toggle.day:active{transform:translateY(0) scale(.95);}
.phase-toggle.night{background:linear-gradient(135deg,#2c3e50,#1a252f);color:var(--text);border:1px solid #3a5068;}
.phase-toggle.night:hover{border-color:var(--accent3);box-shadow:0 2px 10px rgba(0,229,255,.15);}
.game-header .btn-restart-game{padding:7px 14px;border:1px solid rgba(0,201,167,.3);border-radius:var(--radius-sm);background:transparent;color:var(--accent);cursor:pointer;font-size:0.78em;transition:all .25s ease;}
.game-header .btn-restart-game:hover{background:rgba(0,201,167,.1);border-color:var(--accent);}
.status-bar{display:flex;gap:12px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;font-size:0.8em;flex-wrap:wrap;align-items:center;}
.status-bar .alive{color:var(--green);font-weight:600;}
.status-bar .alive::before{content:'🟢 ';}
.status-bar .dead-status{color:var(--red);}
.status-bar .dead-status::before{content:'💀 ';}
.track-wrap{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.track-wrap>div{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;transition:border-color .2s ease;}
.track-wrap>div:focus-within{border-color:var(--accent2);}
.track-wrap .track-label{font-size:0.7em;color:var(--text2);margin-bottom:4px;font-weight:500;}
.track-wrap textarea{width:100%;padding:6px 8px;border:none;border-radius:6px;background:var(--bg2);color:var(--text);font-size:0.75em;resize:vertical;height:34px;outline:none;transition:all .2s ease;font-family:inherit;}
.track-wrap textarea:focus{background:var(--card3);box-shadow:inset 0 0 0 1px var(--accent2);}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:12px;}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px;position:relative;transition:all .25s ease;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.player-card:hover{border-color:var(--accent2);box-shadow:0 8px 30px rgba(0,201,167,.12);transform:translateY(-1px);}
.player-card.dead{opacity:.4;border-color:var(--red);background:var(--bg2);}
.player-card.dead::after{content:'💀';position:absolute;top:4px;right:6px;font-size:1em;opacity:.7;}
.player-card .seat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.player-card .seat{font-size:1.1em;font-weight:700;color:var(--gold);}
.player-card .seat .tag{font-size:0.5em;color:var(--dim);font-weight:400;}
.player-card .role-badge{font-size:0.6em;padding:3px 8px;border-radius:8px;white-space:nowrap;font-weight:600;}
.role-badge.unknown{background:rgba(100,100,100,.15);color:var(--dim);}
.role-badge.claimed{background:rgba(127,140,141,.2);color:var(--text2);border:1px solid rgba(127,140,141,.3);}
.role-badge.confirmed{background:rgba(25,118,210,.25);color:var(--blue);border:1px solid rgba(66,165,245,.2);}
.player-card input.name{width:100%;padding:4px 8px;border:none;border-radius:6px;background:var(--bg2);color:var(--text);font-size:0.7em;margin-bottom:4px;outline:none;transition:all .2s ease;}
.player-card input.name:focus{background:var(--card3);box-shadow:inset 0 0 0 1px var(--accent2);}
.player-card .role-row{display:flex;gap:4px;margin-bottom:4px;align-items:center;}
.player-card .role-row select{flex:1;padding:3px 4px;border:none;border-radius:4px;background:var(--bg2);color:var(--dim);font-size:0.62em;outline:none;cursor:pointer;transition:all .2s ease;}
.player-card .role-row select:focus{color:var(--text);background:var(--card3);}
.player-card .role-row select option{background:var(--card2);color:var(--text);}
.player-card .role-row .btn-role-set{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--dim);padding:2px 6px;font-size:0.55em;cursor:pointer;transition:all .2s ease;white-space:nowrap;}
.player-card .role-row .btn-role-set:hover{border-color:var(--accent2);color:var(--accent3);}
.player-card .speech-box{width:100%;height:50px;padding:6px;border:none;border-radius:6px;background:var(--bg2);color:var(--text);font-size:0.65em;resize:vertical;outline:none;overflow-y:auto;line-height:1.45;min-height:30px;max-height:100px;margin-bottom:4px;transition:all .2s ease;font-family:inherit;}
.player-card .speech-box:focus{background:var(--card3);box-shadow:inset 0 0 0 1px var(--accent2);}
.player-card .actions{display:flex;gap:3px;flex-wrap:wrap;}
.player-card .actions button{padding:4px 6px;border:none;border-radius:5px;cursor:pointer;font-size:0.6em;transition:all .2s ease;flex:1;white-space:nowrap;font-weight:600;}
.player-card .actions button:hover{transform:translateY(-1px);}
.player-card .actions button:active{transform:translateY(0) scale(.92);}
.btn-record{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;box-shadow:0 2px 6px rgba(46,204,113,.2);}
.btn-record:hover{box-shadow:0 4px 12px rgba(46,204,113,.35)!important;}
.btn-record.recording{background:linear-gradient(135deg,var(--red),#c0392b);animation:pulse 1s infinite;box-shadow:0 0 15px rgba(231,76,60,.3);}
.btn-voice{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1a1a;box-shadow:0 2px 6px rgba(240,192,64,.2);}
.btn-voice:hover{box-shadow:0 4px 12px rgba(240,192,64,.35)!important;}
.btn-voice.recording{background:linear-gradient(135deg,var(--red),#c0392b);color:#fff;animation:pulse 1s infinite;box-shadow:0 0 15px rgba(231,76,60,.3)!important;}
.btn-play{background:linear-gradient(135deg,var(--blue),#2471a3);color:#fff;box-shadow:0 2px 6px rgba(52,152,219,.2);}
.btn-play:hover{box-shadow:0 4px 12px rgba(52,152,219,.35)!important;}
.btn-play.playing{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.85;transform:scale(1.05);}}
.btn-toggle-dead{background:var(--card3);color:var(--text2);border:1px solid var(--border)!important;}
.btn-toggle-dead:hover{background:rgba(231,76,60,.15);border-color:var(--red)!important;color:var(--red);}
.btn-clear-speech{background:var(--bg2);color:var(--dim);border:1px solid var(--border)!important;}
.btn-clear-speech:hover{background:rgba(231,76,60,.1);border-color:var(--red)!important;color:var(--red);}
.btn-record:disabled,.btn-voice:disabled{opacity:.3;cursor:not-allowed;background:var(--card3)!important;box-shadow:none!important;}
.btn-record:disabled:hover,.btn-voice:disabled:hover{transform:none!important;}
.analysis-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow);}
.analysis-section .section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.analysis-section .section-title h3{font-size:1em;color:var(--text);font-weight:700;}
.analysis-section .section-title .btn-group{display:flex;gap:8px;}
.analysis-section .section-title button{padding:9px 18px;border:none;border-radius:var(--radius-sm);color:#fff;cursor:pointer;font-weight:700;font-size:0.82em;transition:all .25s ease;letter-spacing:.3px;}
.analysis-section .section-title button:hover{transform:translateY(-2px);}
.analysis-section .section-title button:active{transform:translateY(0) scale(.96);}
#btn-analyze{background:linear-gradient(135deg,var(--accent2),#1565c0);box-shadow:0 3px 12px rgba(25,118,210,.3);}
#btn-analyze:hover{box-shadow:0 6px 20px rgba(25,118,210,.45);}
#btn-speech{background:linear-gradient(135deg,var(--accent),#00897b);color:#fff;box-shadow:0 3px 12px rgba(0,201,167,.25);}
#btn-speech:hover{box-shadow:0 6px 20px rgba(0,201,167,.4);}
.analysis-section .section-title button:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.analysis-section .section-title button.loading{animation:pulse 1s infinite;}
.analysis-output{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;min-height:80px;max-height:460px;overflow-y:auto;font-size:0.85em;line-height:1.75;white-space:pre-wrap;scrollbar-width:thin;scrollbar-color:var(--card3) transparent;}
.analysis-output::-webkit-scrollbar{width:6px;}
.analysis-output::-webkit-scrollbar-track{background:transparent;}
.analysis-output::-webkit-scrollbar-thumb{background:var(--card3);border-radius:3px;}
.analysis-output .placeholder{color:var(--dim);font-style:italic;}
.analysis-output .thinking{color:var(--gold);animation:pulse 1.5s infinite;}
.btn-settings{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-size:1.4em;cursor:pointer;box-shadow:0 4px 20px rgba(25,118,210,.4);z-index:100;display:none;transition:all .25s ease;}
.btn-settings:hover{transform:rotate(30deg) scale(1.1);box-shadow:0 6px 25px rgba(25,118,210,.5);}
.btn-settings:active{transform:rotate(30deg) scale(.95);}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;animation:fadeIn .2s ease;}
.modal-overlay.show{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:440px;width:90%;max-height:80vh;overflow-y:auto;animation:slideUp .25s ease;box-shadow:0 10px 40px rgba(0,0,0,.5);}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-box h3{margin-bottom:18px;color:var(--gold);font-size:1.1em;}
.modal-box label{display:block;margin:14px 0 5px;font-size:0.82em;color:var(--text2);}
.modal-box select,.modal-box input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);border:1px solid var(--border);font-size:0.95em;outline:none;transition:all .2s ease;}
.modal-box select:focus,.modal-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,201,167,.12);}
.modal-box .modal-actions{display:flex;gap:10px;margin-top:22px;}
.modal-box .modal-actions button{flex:1;padding:11px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:0.88em;font-weight:600;transition:all .2s ease;}
.modal-box .modal-actions .btn-save{background:linear-gradient(135deg,var(--accent),#00897b);color:#fff;box-shadow:0 3px 10px rgba(0,201,167,.25);}
.modal-box .modal-actions .btn-save:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,201,167,.35);}
.modal-box .modal-actions .btn-save:active{transform:translateY(0) scale(.96);}
.modal-box .modal-actions .btn-cancel{background:var(--card3);color:var(--text2);border:1px solid var(--border);}
.modal-box .modal-actions .btn-cancel:hover{background:var(--bg2);color:var(--text);}
.modal-box .modal-actions .btn-cancel:active{transform:scale(.96);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) scale(.9);background:#1a1a2e;color:#f0f0f0;padding:12px 28px;border-radius:var(--radius-sm);font-size:0.85em;z-index:300;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.toast.show{opacity:1;transform:translateX(-50%) scale(1);}
@media(max-width:600px){.player-grid{grid-template-columns:repeat(3,1fr);gap:5px;}.player-card{padding:7px;}.player-card .speech-box{height:40px;font-size:0.6em;}.player-card .seat{font-size:1em;}.player-card input.name{font-size:0.65em;}.game-header{flex-direction:column;align-items:stretch;gap:8px;}.game-header .info{justify-content:center;}.game-header .round-ctrl{justify-content:center;}.analysis-output{font-size:0.8em;}#setup-screen h1{font-size:1.7em;}.setup-form{padding:24px 20px;}}
@media(min-width:768px){.player-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1024px){.player-grid{grid-template-columns:repeat(6,1fr);}}
</style>
</head>
<body>
<div id="setup-screen">
  <h1>🐺 狼人杀发言助手</h1>
  <p class="subtitle">AI 驱动的游戏发言分析与伪装方案</p>
  <div class="setup-form">
    <label>版型 (Board Type)</label>
    <select id="s-board"><option value="预女猎白 (标准)">预女猎白 (标准)</option>
      <option value="狼王守卫">狼王守卫</option><option value="狼王魔术师">狼王魔术师</option>
      <option value="石像鬼守墓人">石像鬼守墓人</option><option value="血月使徒">血月使徒</option>
      <option value="噩梦之影">噩梦之影</option><option value="咒狐">咒狐</option>
      <option value="9人局">9人局</option><option value="6人局">6人局</option>
    </select>
    <label>我的身份 (My Role)</label>
    <select id="s-role">
      <optgroup label="好人阵营">
        <option value="平民">平民</option><option value="预言家">预言家</option>
        <option value="女巫">女巫</option><option value="猎人">猎人</option>
        <option value="白痴">白痴</option><option value="守卫">守卫</option>
        <option value="骑士">骑士</option><option value="魔术师">魔术师</option>
        <option value="守墓人">守墓人</option><option value="摄梦人">摄梦人</option>
      </optgroup>
      <optgroup label="狼人阵营">
        <option value="狼人">狼人</option><option value="狼王">狼王</option>
        <option value="白狼王">白狼王</option><option value="狼美人">狼美人</option>
        <option value="石像鬼">石像鬼</option><option value="血月使徒">血月使徒</option>
        <option value="噩梦之影">噩梦之影</option><option value="机械狼">机械狼</option>
      </optgroup>
    </select>
    <label>我的号码牌 (My Seat #)</label>
    <select id="s-seat">
      <option value="1">1号</option><option value="2">2号</option><option value="3">3号</option>
      <option value="4">4号</option><option value="5">5号</option><option value="6">6号</option>
      <option value="7">7号</option><option value="8">8号</option><option value="9">9号</option>
      <option value="10">10号</option><option value="11">11号</option><option value="12">12号</option>
      <option value="13">13号</option><option value="14">14号</option><option value="15">15号</option>
      <option value="16">16号</option><option value="17">17号</option><option value="18">18号</option>
    </select>
    <label>DeepSeek API Key</label>
    <input type="password" id="s-apikey" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
    <p class="apikey-note">API Key 仅保存在本地浏览器，不会上传到任何服务器</p>
    <label>狼队友号码（如果你是狼人，选填）</label>
    <input type="text" id="s-wolf-teammates" placeholder="如: 3,7,11">
    <button class="btn-start" onclick="startGame()">🎮 开始游戏</button>
    <button class="btn-restore" onclick="restoreGame()" id="btn-restore" style="display:none">📂 恢复上一局游戏</button>
  </div>
</div>
<div id="game-screen">
  <div class="game-header">
    <div class="info">
      <span>🎲 <span id="g-board"></span></span>
      <span class="myrole" id="g-role"></span>
      <span class="myseat" id="g-seat"></span>
    </div>
    <div class="round-ctrl">
      <button onclick="changeRound(-1)">◀</button>
      <span class="round-num" id="g-round">第1轮 白天</span>
      <button onclick="changeRound(1)">▶</button>
      <button class="phase-toggle day" id="g-phase-btn" onclick="togglePhase()">🌙 入夜</button>
      <button class="btn-restart-game" onclick="resetGame()">🔄 重开</button>
    </div>
  </div>
  <div class="status-bar" id="status-bar"></div>

  </div>

<div class="toast" id="toast"></div>
<script>
var S={board:'',myRole:'',mySeat:0,totalPlayers:12,round:1,phase:'day',players:{},apiKey:'',wolfTees:[],gameStarted:false,model:'deepseek-chat',xfAppid:'',xfKey:'',xfSecret:'',audioBlobs:{},votes:'',deaths:'',notes:''};
var RK={
  '预言家':'每晚查验一人身份。','女巫':'一瓶解药一瓶毒药。','猎人':'出局可开枪带走一人。','白痴':'被放逐可翻牌免死。','守卫':'每晚守护一人防狼刀。','骑士':'白天可决斗验证身份。','魔术师':'夜晚可交换两人身份。','守墓人':'次日知道出局者阵营。','摄梦人':'每晚摄梦一人,若连续摄梦同一人则救活。',
  '狼人':'每晚刀一人,可自刀。','狼王':'被放逐可开枪带走一人。','白狼王':'白天自爆带走一人。','狼美人':'每晚魅惑一人,出局时带走。','石像鬼':'每晚查验一人身份。','血月使徒':'自爆后进入黑夜,沉默全场。','噩梦之影':'恐惧一人使其整夜不能行动。','机械狼':'可学习一个已死角色的技能。',
};
var BOARDS=[['预女猎白 (标准)',12],['狼王守卫',12],['狼王魔术师',12],['石像鬼守墓人',12],['血月使徒',12],['噩梦之影',12],['咒狐',12],['奇迹商人',12],['炼金魔女',12],['蚀时狼妃',12],['白昼学者/寂夜导师',12],['鹰眼',12],['纯白夜影',12],['隐狼',12],['阴阳师',12],['夜之贵族',12],['白狼王愚者骑士',12],['9人局',9],['6人局',6]];
var WOLF_NAMES=['狼人','狼王','白狼王','狼美人','石像鬼','血月使徒','噩梦之影','机械狼','蚀时狼妃','隐狼'];
var GOOD_NAMES=['平民','预言家','女巫','猎人','白痴','守卫','骑士','魔术师','守墓人','摄梦人','奇迹商人','炼金魔女','白昼学者','寂夜导师','鹰眼','纯白夜影','阴阳师','夜之贵族'];
var ALL_ROLES=GOOD_NAMES.concat(WOLF_NAMES);

function SG(){try{localStorage.setItem('werewolf_game',JSON.stringify({board:S.board,myRole:S.myRole,mySeat:S.mySeat,totalPlayers:S.totalPlayers,round:S.round,phase:S.phase,players:S.players,wolfTees:S.wolfTees,gameStarted:true,votes:S.votes,deaths:S.deaths,notes:S.notes,model:S.model}));localStorage.setItem('werewolf_apikey',S.apiKey||'');}catch(e){}}
function LG(){try{var r=localStorage.getItem('werewolf_game');return r?JSON.parse(r):null;}catch(e){return null;}}
function CG(){localStorage.removeItem('werewolf_game');}

function initP(t,s){var p={};for(var i=1;i<=t;i++){p[i]={name:'',speeches:[],alive:true,deadRound:0,deadCause:'',roleGuess:'unknown',audioBlob:null};}return p;}
function showT(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}

document.addEventListener('DOMContentLoaded',function(){
  var k=localStorage.getItem('werewolf_apikey');if(k)document.getElementById('s-apikey').value=k;
  var saved=LG();if(saved&&saved.gameStarted)document.getElementById('btn-restore').style.display='block';
});

function startGame(){
  S.board=document.getElementById('s-board').value;
  S.myRole=document.getElementById('s-role').value;
  S.mySeat=parseInt(document.getElementById('s-seat').value);
  S.apiKey=document.getElementById('s-apikey').value.trim();
  S.totalPlayers=12;
  for(var i=0;i<BOARDS.length;i++){if(BOARDS[i][0]===S.board){S.totalPlayers=BOARDS[i][1];break;}}
  if(!S.apiKey){showT('请输入 DeepSeek API Key');return;}
  var t=document.getElementById('s-wolf-teammates').value.trim();
  S.wolfTees=t?t.split(',').map(function(s){return parseInt(s.trim());}).filter(function(n){return !isNaN(n);}):[];
  S.round=1;S.phase='day';S.players=initP(S.totalPlayers,S.mySeat);S.gameStarted=true;S.votes='';S.deaths='';S.notes='';S.audioBlobs={};
  SG();renderG();
}

function restoreGame(){var saved=LG();if(!saved)return;S=saved;renderG();}

function renderG(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  document.getElementById('settings-btn').style.display='flex';
  document.getElementById('g-board').textContent=S.board;
  document.getElementById('g-role').textContent='🎭 '+S.myRole;
  document.getElementById('g-seat').textContent='💺 '+S.mySeat+'号';
  updRound();renderP();updBar();
  document.getElementById('g-votes').value=S.votes||'';
  document.getElementById('g-deaths').value=S.deaths||'';
  document.getElementById('g-notes').value=S.notes||'';
  SG();
}
function updRound(){
  var pt=S.phase==='day'?'☀️ 白天':'🌙 夜晚';
  document.getElementById('g-round').textContent='第'+S.round+'轮 '+pt;
  var btn=document.getElementById('g-phase-btn');
  btn.textContent=S.phase==='day'?'🌙 入夜':'☀️ 天亮';
  btn.className='phase-toggle '+(S.phase==='day'?'day':'night');
}
function renderP(){
  var grid=document.getElementById('player-grid');grid.innerHTML='';
  var seats=Object.keys(S.players).map(Number).sort(function(a,b){return a-b;});
  for(var i=0;i<seats.length;i++){
    var seat=seats[i],p=S.players[seat],isMe=seat===S.mySeat;
    var speeches=p.speeches.map(function(s){return'['+(s.phase==='day'?'白天':'夜晚')+(s.round?' R'+s.round:'')+'] '+s.text;}).join('\n');
    var card=document.createElement('div');
    card.className='player-card'+(p.alive?'':' dead');
    card.id='pcard-'+seat;
    var roleOpts='<option value="unknown">身份?</option><option value="claimed">自称</option><option value="confirmed">确认</option>';
    card.innerHTML='<div class="seat-row"><span class="seat">'+seat+'号 '+(isMe?'<span class="tag">👤我</span>':'')+'</span><span class="role-badge '+p.roleGuess+'">'+(p.roleGuess==='unknown'?'?':p.roleGuess==='claimed'?'自称':p.roleGuess==='confirmed'?'确认':'')+'</span></div>'+
      '<input class="name" id="pname-'+seat+'" placeholder="昵称" value="'+(p.name||'')+'" oninput="updatePName('+seat+',this.value)">'+
      '<div class="role-row"><select id="prole-'+seat+'">'+roleOpts+'</select><button class="btn-role-set" onclick="setRoleGuess('+seat+')">设置</button></div>'+
      '<textarea class="speech-box" id="pspeech-'+seat+'" placeholder="'+(isMe?'点击生成发言稿':'点击🎤录音')+'" oninput="updatePSpeech('+seat+',this.value)">'+speeches+'</textarea>'+
      '<div class="actions"><button class="btn-record" id="prec-'+seat+'" onclick="toggleRec('+seat+')" '+(p.alive&&!isMe?'':'disabled')+'>🎤</button>'+
      '<button class="btn-toggle-dead" onclick="toggleDead('+seat+')" '+((!isMe)?'':'disabled')+'>'+ (p.alive?'💀':'🔄')+'</button>'+
      '<button class="btn-clear-speech" onclick="clearPSpeech('+seat+')">🗑️</button></div>';
    grid.appendChild(card);
    var sel=document.getElementById('prole-'+seat);
    if(sel)sel.value=p.roleGuess||'unknown';
  }
}
function updBar(){
  var a=[],d=[];
  for(var s in S.players){var p=S.players[s];if(p.alive)a.push(s);else d.push(s);}
  document.getElementById('status-bar').innerHTML='<span class="alive">存活: '+a.join(', ')+'</span><span class="dead-status">阵亡: '+(d.length?d.join(', '):'无')+'</span>';
}
function updatePName(seat,val){S.players[seat].name=val;SG();}
function updatePSpeech(seat,val){
  if(!S.players[seat])return;
  var ex=S.players[seat].speeches.find(function(s){return s.round===0;});
  if(ex){ex.text=val;}else{S.players[seat].speeches.push({round:0,phase:S.phase,text:val});}
  SG();
}
function setRoleGuess(seat){
  var v=document.getElementById('prole-'+seat).value;
  S.players[seat].roleGuess=v;
  renderP();SG();
}
function toggleDead(seat){
  var p=S.players[seat];p.alive=!p.alive;
  if(!p.alive){p.deadRound=S.round;p.deadCause=S.phase==='day'?'放逐':'阵亡';}
  renderP();updBar();SG();
}
function clearPSpeech(seat){S.players[seat].speeches=[];document.getElementById('pspeech-'+seat).value='';SG();}
function changeRound(d){S.round=Math.max(1,S.round+d);updRound();SG();}
function togglePhase(){S.phase=S.phase==='day'?'night':'day';updRound();SG();}

var _rec=null,_seat=null;
function toggleRec(seat){
  if(_seat===seat&&_rec){stopRec();return;}
  if(_rec){try{_rec.stop();}catch(e){}var pb=document.getElementById('prec-'+_seat);if(pb){pb.textContent='🎤';pb.classList.remove('recording');}}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showT('浏览器不支持语音识别,请用 Chrome');return;}
  _rec=new SR();_rec.lang='zh-CN';_rec.continuous=true;_rec.interimResults=true;_seat=seat;
  var btn=document.getElementById('prec-'+seat);btn.textContent='⏹️';btn.classList.add('recording');
  var ft='';
  _rec.onresult=function(e){
    var im='',fn='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t=e.results[i][0].transcript;
      if(e.results[i].isFinal){fn+=t;ft+=t;}else{im+=t;}
    }
    var p=S.players[seat],ex=p.speeches.filter(function(s){return s.round!==-1;}).map(function(s){return'['+(s.phase==='day'?'白天':'夜晚')+(s.round?'R'+s.round:'')+'] '+s.text;}).join('\n');
    document.getElementById('pspeech-'+seat).value=ex+(fn||im?'\n[🎤] '+ft+(im?'('+im+')':''));
    var ta=document.getElementById('pspeech-'+seat);ta.scrollTop=ta.scrollHeight;
  };
  _rec.onerror=function(e){showT('录音错误:'+e.error);var b=document.getElementById('prec-'+seat);if(b){b.textContent='🎤';b.classList.remove('recording');}_rec=null;_seat=null;};
  _rec.onend=function(){
    if(ft.trim()){S.players[seat].speeches.push({round:S.round,phase:S.phase,text:ft.trim()});SG();}
    var b=document.getElementById('prec-'+seat);if(b){b.textContent='🎤';b.classList.remove('recording');}_rec=null;_seat=null;
  };
  try{_rec.start();showT('🎤 录制 '+seat+'号...');}catch(e){showT('启动录音失败: 请授权麦克风');btn.textContent='🎤';btn.classList.remove('recording');_rec=null;_seat=null;}
}
function stopRec(){if(_rec){try{_rec.stop();}catch(e){}var b=document.getElementById('prec-'+_seat);if(b){b.textContent='🎤';b.classList.remove('recording');}_rec=null;_seat=null;}}

function buildP(mode){
  var w=WOLF_NAMES.indexOf(S.myRole)>=0;
  var info='';
  var seats=Object.keys(S.players).map(Number).sort(function(a,b){return a-b;});
  for(var i=0;i<seats.length;i++){
    var s=seats[i],p=S.players[s];
    if(p.speeches.length===0)continue;
    var tag=s===S.mySeat?'(我)':'';var nm=p.name?'-'+p.name:'';
    info+='【'+s+'号'+tag+nm+'】\n';
    for(var j=0;j<p.speeches.length;j++){
      var sp=p.speeches[j];
      if(sp.round===0&&sp.phase==='manual')continue;
      info+='  [R'+sp.round+' '+sp.phase+'] '+sp.text+'\n';
    }
    info+='\n';
  }
  var votes=S.votes?'\n🗳️投票:\n'+S.votes+'\n':'';
  var deaths=S.deaths?'\n💀死讯:\n'+S.deaths+'\n':'';
  var notes=S.notes?'\n📝备注:\n'+S.notes+'\n':'';
  var phases='请严格按照以下五阶段框架推理,每阶段都要输出:\n=== 阶段一:事实整理 ===\n列出存活/阵亡、死亡顺序、确认身份、投票信息、对立面。每条标【事实N】。\n=== 阶段二:逐人排查 ===\n每人:发言核心、逻辑链条、矛盾点、行为模式、身份推测、狼面⭐1~5\n=== 阶段三:关系网络 ===\n互保、对立、绑定、集火目标、被无视的人\n=== 阶段四:逻辑推演 ===\n假设验证(真预言家vs悍跳)、多套狼坑、排除法、时间线、穿衣服\n=== 阶段五:最终结论 ===\n最可能的狼坑、今天出谁、风险提示、发言关键词';
  var sys,user;
  if(mode==='分析'){
    if(w){
      sys='你是狼人杀顶级分析师,帮狼人获胜。五阶段分析,引用玩家原话。\n'+RK;
      user='版型:'+S.board+'\n我:'+S.mySeat+'号'+S.myRole+'(狼) 队友:'+(S.wolfTees.length?S.wolfTees.join(','):'无')+'\n第'+S.round+'轮 '+(S.phase==='day'?'白天':'夜晚')+votes+deaths+notes+'\n'+info+'\n'+phases+'\n\n【狼人视角】\n1.谁最容易做抗推位?\n2.谁最可能是神职?\n3.狼队冲票/倒钩/分票?\n4.我跳什么身份?';
    }else{
      sys='你是狼人杀顶级分析师,帮好人找狼。五阶段分析,引用玩家原话。\n'+RK;
      user='版型:'+S.board+'\n我:'+S.mySeat+'号'+S.myRole+'(好人)\n第'+S.round+'轮 '+(S.phase==='day'?'白天':'夜晚')+votes+deaths+notes+'\n'+info+'\n'+phases;
    }
  }else{
    if(w){
      sys='你是狼人杀伪装大师,帮狼人写发言稿。口语化、引用具体发言、不撞已翻牌身份。\n'+RK;
      user='版型:'+S.board+'\n我:'+S.mySeat+'号'+S.myRole+'(狼) 队友:'+(S.wolfTees.length?S.wolfTees.join(','):'无')+'\n第'+S.round+'轮 '+(S.phase==='day'?'白天':'夜晚')+votes+deaths+notes+'\n'+info+'\n\n1.【身份策略】跳什么?\n2.【攻击目标】打谁?引用他原话\n3.【完整发言稿】以"'+S.mySeat+'号玩家发言"开头,口语化\n4.【备用方案】被质疑怎么办?\n5.【投票指导】投谁?';
    }else{
      sys='你是狼人杀顶尖发言玩家,帮好人写发言稿。口语化、引用具体玩家原话。\n'+RK;
      user='版型:'+S.board+'\n我:'+S.mySeat+'号'+S.myRole+'(好人)\n第'+S.round+'轮 '+(S.phase==='day'?'白天':'夜晚')+votes+deaths+notes+'\n'+info+'\n\n1.【局势判断】一句话\n2.【逻辑武器】最大的逻辑点\n3.【完整发言稿】以"'+S.mySeat+'号玩家发言"开头\n4.【投票建议】投谁?';
    }
  }
  return{sys:sys,user:user};
}

async function callDS(mode){
  var btnA=document.getElementById('btn-analyze'),btnS=document.getElementById('btn-speech');
  btnA.disabled=true;btnS.disabled=true;btnA.classList.add('loading');
  var out=document.getElementById('analysis-output');
  out.innerHTML='<div class="thinking">🧠 AI 推理中...</div>';
  var p=buildP(mode),model=S.model||'deepseek-chat';
  var body={model:model,messages:[{role:'system',content:p.sys},{role:'user',content:p.user}],max_tokens:4096,stream:false};
  if(model!=='deepseek-reasoner')body.temperature=0.6;
  try{
    var resp=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},
      body:JSON.stringify(body),
    });
    if(!resp.ok){var e=await resp.text();throw new Error('HTTP '+resp.status+': '+e.substring(0,300));}
    var data=await resp.json();
    out.innerHTML=data.choices[0].message.content||'无输出';
    if(mode==='发言'){
      var ta=document.getElementById('pspeech-'+S.mySeat);
      if(ta){var nc='\n[🎯AI发言 R'+S.round+' '+S.phase+']\n'+(data.choices[0].message.content||'').substring(0,1000);ta.value+=nc;S.players[S.mySeat].speeches.push({round:S.round,phase:S.phase,text:'[AI发言] '+(data.choices[0].message.content||'').substring(0,300)});SG();}
    }
  }catch(e){out.innerHTML='<div style="color:var(--red)">❌ 失败: '+e.message+'<br>检查API Key/余额/网络</div>';}
  btnA.disabled=false;btnS.disabled=false;btnA.classList.remove('loading');
}
function quickAnalysis(m){if(!S.apiKey){showT('请先在设置中配置 API Key');openSettings();return;}callDS(m);}

function openSettings(){
  document.getElementById('m-round').value=S.round;
  document.getElementById('m-apikey').value=S.apiKey||'';
  document.getElementById('m-wolf-teammates').value=S.wolfTees.join(',');
  document.getElementById('settings-modal').classList.add('show');
}
function closeSettings(){document.getElementById('settings-modal').classList.remove('show');}
function saveSettings(){
  S.round=parseInt(document.getElementById('m-round').value);
  var k=document.getElementById('m-apikey').value.trim();if(k)S.apiKey=k;
  var t=document.getElementById('m-wolf-teammates').value.trim();
  S.wolfTees=t?t.split(',').map(function(s){return parseInt(s.trim());}).filter(function(n){return !isNaN(n);}):[];
  var v=document.getElementById('g-votes');if(v)S.votes=v.value;
  var d=document.getElementById('g-deaths');if(d)S.deaths=d.value;
  var n=document.getElementById('g-notes');if(n)S.notes=n.value;
  updRound();renderP();updBar();SG();closeSettings();showT('已保存');
}
function resetGame(){
  if(!confirm('确定重置所有数据?'))return;
  CG();S={board:'',myRole:'',mySeat:0,totalPlayers:12,round:1,phase:'day',players:{},apiKey:'',wolfTees:[],gameStarted:false,model:'deepseek-chat',xfAppid:'',xfKey:'',xfSecret:'',audioBlobs:{},votes:'',deaths:'',notes:''};
  document.getElementById('game-screen').style.display='none';
  document.getElementById('setup-screen').style.display='flex';
  document.getElementById('settings-btn').style.display='none';
  document.getElementById('settings-modal').classList.remove('show');
  document.getElementById('btn-restore').style.display='none';
}

// Track-wrap auto-save on input
document.addEventListener('input',function(e){
  if(e.target.id==='g-votes'||e.target.id==='g-deaths'||e.target.id==='g-notes'){
    S.votes=document.getElementById('g-votes')?document.getElementById('g-votes').value:'';
    S.deaths=document.getElementById('g-deaths')?document.getElementById('g-deaths').value:'';
    S.notes=document.getElementById('g-notes')?document.getElementById('g-notes').value:'';
    SG();
  }
});

document.addEventListener('keydown',function(e){if(e.key==='Escape'&&_rec){stopRec();showT('录音已停止');}});
window.addEventListener('beforeunload',function(){if(_rec){try{_rec.stop();}catch(e){}}SG();});
</script>
</body>
</html>
